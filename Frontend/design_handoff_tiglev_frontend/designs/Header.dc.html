<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<header style="{{ headerStyle }}">
  <div style="max-width:1280px;margin:0 auto;padding:0 24px;">
    <div style="display:flex;align-items:center;justify-content:space-between;height:{{ headerRowHeight }}px;">
      <a href="Tiglev.dc.html" aria-label="TIGLEV.COM — на главную" style="display:flex;align-items:center;gap:10px;">
        <img src="public/logo.svg" alt="TIGLEV.COM" width="40" height="40" style="width:40px;height:40px;display:block;">
        <span style="{{ logoTextStyle }}">TIGLEV.COM</span>
      </a>

      <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
        <nav aria-label="Основная навигация" style="display:flex;align-items:center;gap:4px;">
          <sc-for list="{{ navLinksComputed }}" as="link" hint-placeholder-count="4">
            <a href="{{ link.href }}" style="{{ link.style }}">
              {{ link.label }}
              <sc-if value="{{ link.isActive }}" hint-placeholder-val="{{ false }}">
                <span style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:20px;height:2px;border-radius:999px;background:#C41E24;"></span>
              </sc-if>
            </a>
          </sc-for>
        </nav>
      </sc-if>
      <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;align-items:center;gap:12px;">
          <a href="tel:+78482750750" aria-label="Позвонить: +7 (8482) 750-750" style="{{ ctaPhoneStyle }}">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .7-.2 1z"></path></svg>
            +7 (8482) 750-750
          </a>
          <a href="Contacts.dc.html" style="display:flex;align-items:center;gap:8px;border-radius:10px;background:#C41E24;padding:10px 20px;font-size:14px;font-weight:600;color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.05);transition:all .3s;" style-hover="background:#9B171C;box-shadow:0 4px 10px rgba(196,30,36,.25);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 01-4.5 7.4 8.4 8.4 0 01-8.3 0L4 20l1.1-4.2A8.4 8.4 0 1121 11.5z"></path></svg>
            Написать нам
          </a>
        </div>
      </sc-if>
      <sc-if value="{{ isNotDesktop }}" hint-placeholder-val="{{ false }}">
        <button type="button" aria-label="{{ mobileMenuAriaLabel }}" onClick="{{ toggleMobileMenu }}" style="{{ hamburgerStyle }}">
          <sc-if value="{{ isMobileMenuOpen }}" hint-placeholder-val="{{ false }}">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </sc-if>
          <sc-if value="{{ isMobileMenuNotOpen }}" hint-placeholder-val="{{ true }}">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </sc-if>
        </button>
      </sc-if>
    </div>
  </div>

  <div onClick="{{ closeMobileMenu }}" style="{{ mobileOverlayStyle }}"></div>
  <div style="{{ mobilePanelStyle }}">
    <nav aria-label="Мобильная навигация" style="display:flex;flex-direction:column;padding:24px 16px 32px;">
      <sc-for list="{{ mobileNavLinksComputed }}" as="link" hint-placeholder-count="4">
        <a href="{{ link.href }}" onClick="{{ closeMobileMenu }}" style="{{ link.style }}">{{ link.label }}</a>
      </sc-for>
      <div style="margin-top:24px;border-top:1px solid #E2E8F0;padding-top:24px;">
        <a href="tel:+78482750750" style="display:flex;align-items:center;gap:12px;border-radius:10px;padding:14px 16px;font-size:16px;font-weight:600;color:#0F172A;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C41E24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.4 0 .7-.2 1z"></path></svg>
          +7 (8482) 750-750
        </a>
        <a href="Contacts.dc.html" onClick="{{ closeMobileMenu }}" style="margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:10px;background:#C41E24;padding:14px;text-align:center;font-size:14px;font-weight:600;color:#fff;">Написать нам</a>
      </div>
    </nav>
  </div>
</header>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 80}, &quot;activePage&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;&quot;, &quot;options&quot;: [&quot;&quot;, &quot;catalog&quot;, &quot;sell&quot;, &quot;asia&quot;, &quot;contacts&quot;], &quot;tsType&quot;: &quot;string&quot;}, &quot;transparentOnTop&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;}}">
class Component extends DCLogic {
  static NAV_LINKS = [
    { key: "catalog", href: "Catalog.dc.html", label: "Каталог" },
    { key: "sell", href: "SellCar.dc.html", label: "Продать авто" },
    { key: "asia", href: "ImportCars.dc.html", label: "Авто на Заказ" },
    { key: "contacts", href: "Contacts.dc.html", label: "Контакты" },
  ];

  state = {
    isMobileMenuOpen: false,
    isDesktop: typeof window !== "undefined" ? window.innerWidth >= 1024 : true,
    isScrolled: !this.props.transparentOnTop,
  };

  componentDidMount() {
    this.handleResize = () => this.setState({ isDesktop: window.innerWidth >= 1024 });
    window.addEventListener("resize", this.handleResize);

    if (this.props.transparentOnTop) {
      this.handleScroll = () => this.setState({ isScrolled: window.scrollY > 50 });
      window.addEventListener("scroll", this.handleScroll, { passive: true });
      this.handleScroll();
    }
  }

  componentWillUnmount() {
    window.removeEventListener("resize", this.handleResize);
    if (this.handleScroll) window.removeEventListener("scroll", this.handleScroll);
  }

  toggleMobileMenu = () => {
    const next = !this.state.isMobileMenuOpen;
    document.body.style.overflow = next ? "hidden" : "";
    this.setState({ isMobileMenuOpen: next });
  };

  closeMobileMenu = () => {
    document.body.style.overflow = "";
    this.setState({ isMobileMenuOpen: false });
  };

  renderVals() {
    const s = this.state;
    const activePage = this.props.activePage || "";
    const primary = "#C41E24", darkC = "#0F172A", darkLight = "#1E293B";

    const headerStyle = s.isScrolled
      ? { position: "fixed", top: 0, left: 0, right: 0, zIndex: 50, transition: "all .5s", borderBottom: "1px solid #E2E8F080", background: "rgba(255,255,255,0.9)", boxShadow: "0 1px 2px rgba(0,0,0,0.05)", backdropFilter: "blur(20px)" }
      : { position: "fixed", top: 0, left: 0, right: 0, zIndex: 50, transition: "all .5s", background: "transparent" };

    const navLinksComputed = Component.NAV_LINKS.map((l) => {
      const isActive = activePage === l.key;
      const color = isActive ? (s.isScrolled ? primary : "#fff") : s.isScrolled ? darkLight : "rgba(255,255,255,.8)";
      return { href: l.href, label: l.label, isActive: isActive, style: { position: "relative", borderRadius: 8, padding: "8px 16px", fontSize: 14, fontWeight: 500, transition: "color .3s", color: color, textDecoration: "none" } };
    });

    const mobileNavLinksComputed = Component.NAV_LINKS.map((l) => {
      const isActive = activePage === l.key;
      return { href: l.href, label: l.label, style: { display: "block", borderRadius: 10, padding: "14px 16px", fontSize: 16, fontWeight: 500, transition: "all .2s", background: isActive ? "rgba(196,30,36,.05)" : "transparent", color: isActive ? primary : darkLight, textDecoration: "none" } };
    });

    const ctaPhoneStyle = { display: "flex", alignItems: "center", gap: 8, borderRadius: 8, padding: "8px 12px", fontSize: 14, fontWeight: 600, transition: "color .5s", color: s.isScrolled ? darkC : "#fff", textDecoration: "none" };
    const hamburgerStyle = { borderRadius: 8, padding: 8, background: "transparent", border: "none", cursor: "pointer", color: s.isScrolled ? darkC : "#fff" };
    const mobileOverlayStyle = { position: "fixed", inset: 0, top: 64, zIndex: 40, background: "rgba(0,0,0,.4)", backdropFilter: "blur(2px)", transition: "opacity .3s", opacity: s.isMobileMenuOpen ? 1 : 0, pointerEvents: s.isMobileMenuOpen ? "auto" : "none" };
    const mobilePanelStyle = { position: "fixed", top: 64, right: 0, bottom: 0, zIndex: 50, width: 288, background: "#fff", boxShadow: "-10px 0 40px rgba(0,0,0,.15)", transition: "transform .3s ease-out", transform: s.isMobileMenuOpen ? "translateX(0)" : "translateX(100%)" };

    return {
      isDesktop: s.isDesktop,
      isNotDesktop: !s.isDesktop,
      headerStyle: headerStyle,
      headerRowHeight: s.isDesktop ? 80 : 64,
      logoTextStyle: { fontSize: 20, fontWeight: 800, letterSpacing: "-0.02em", transition: "color .5s", color: s.isScrolled ? darkC : "#fff" },
      navLinksComputed: navLinksComputed,
      ctaPhoneStyle: ctaPhoneStyle,
      hamburgerStyle: hamburgerStyle,
      isMobileMenuOpen: s.isMobileMenuOpen,
      isMobileMenuNotOpen: !s.isMobileMenuOpen,
      mobileMenuAriaLabel: s.isMobileMenuOpen ? "Закрыть меню" : "Открыть меню",
      toggleMobileMenu: this.toggleMobileMenu,
      closeMobileMenu: this.closeMobileMenu,
      mobileOverlayStyle: mobileOverlayStyle,
      mobilePanelStyle: mobilePanelStyle,
      mobileNavLinksComputed: mobileNavLinksComputed,
    };
  }
}

</script>
</body>
</html>
